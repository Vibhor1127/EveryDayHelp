<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Employee</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* -- same sunset gradient + glass card you liked -- */
    body{
      margin:0;font-family:'Nunito',sans-serif;min-height:100vh;
      background:linear-gradient(-45deg,#00c6ff,#0072ff,#fe8c00,#f83600);
      background-size:600% 600%;animation:bg 18s ease infinite;color:#fff;padding-top:72px;
    }
    @keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    .card-glass{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      border-radius:20px;backdrop-filter:blur(14px);box-shadow:0 10px 25px rgba(0,0,0,.4);animation:fadeIn .8s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

    .form-label{font-weight:600;text-decoration:underline dotted}
    .form-control{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:10px}
    .form-control:focus{background:rgba(255,255,255,.2);border-color:#00ffd5;box-shadow:0 0 10px rgba(0,255,213,.4)}

    .btn-gradient{background:linear-gradient(90deg,#ff8a00,#e52e71,#9b00ff,#0072ff,#00c6ff);
      background-size:500% 500%;border:none;border-radius:12px;font-weight:700;padding:.75rem;color:#fff;
      letter-spacing:.5px;animation:btn 6s linear infinite;transition:transform .25s,box-shadow .25s}
    @keyframes btn{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .btn-gradient:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.3)}
  </style>
</head>

<body>
<!--&lt;!&ndash; Admin navbar &ndash;&gt;-->
<!--<div th:replace="~{/fragments/admin_navbar::adminNav}"></div>-->
<nav class="navbar navbar-expand-lg fixed-top admin-nav">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin/adminHome}">
            Admin&nbsp;<span>Panel</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#adminNav"><span class="navbar-toggler-icon"></span></button>

        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addEmployee}">Add&nbsp;Employee</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addNotice}">Add&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allUsers}">View&nbsp;Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allEmployees}">View&nbsp;Employees</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allNotices}">View&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allContacts}">View&nbsp;Contacts</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-bookings}">View&nbsp;Bookings</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-feedback}">View&nbsp;Feedback</a></li>
            </ul>

            <form th:action="@{/admin/adminLogout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>
<!-- success flash bridge -->
<p id="flash" th:text="${msg}" hidden></p>

<div class="container mt-5">
  <div class="card-glass p-4 mx-auto" style="max-width:900px">
    <h2 class="mb-4 text-center fw-bold" style="text-decoration:underline;">Register New Employee</h2>

    <form th:action="@{/admin/addEmployee}" method="post" enctype="multipart/form-data">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Employee&nbsp;ID</label>
          <input type="text" name="employee_id" class="form-control" placeholder="EMP-001" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" placeholder="Full name" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="10-digit number" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Qualification</label>
          <input type="text" name="qualification" class="form-control" placeholder="e.g. ITI, BSc" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Experience (yrs)</label>
          <input type="text" name="experience" class="form-control" placeholder="e.g. 3" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control">
            <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Employee Type</label>
          <select name="employee_type" class="form-control">
            <option>Gardener</option><option>Cleaner</option><option>Cook</option><option>Driver</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Service Type</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="service_type" value="LTS" checked>
              <label class="form-check-label">Long Term</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="service_type" value="STS">
              <label class="form-check-label">Short Term</label>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Profile Picture</label>
          <input type="file" name="emp_pic" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Charges (₹)</label>
          <input type="text" name="charges" class="form-control" placeholder="e.g. 500/day" required>
        </div>

        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" rows="3" class="form-control" placeholder="Brief description"></textarea>
        </div>

      </div>

      <button class="btn btn-gradient w-100 mt-4">Register Employee</button>
    </form>
  </div>
</div>

<!-- SweetAlert success on flash msg -->
<script>
  const msg = document.getElementById('flash').textContent;
  if(msg){
    Swal.fire({
      title:'Success!',
      text: msg,
      icon:'success',
      confirmButtonColor:'#3085d6'
    })
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
