<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
  <!-- Google Fonts: Poppins & Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* CSS Variables for easy customization */
    :root {
      --admin-gradient-start: #ff8a00; /* Orange */
      --admin-gradient-end: #e52e71;   /* Pink */
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-color: #fff;
      --shadow-color: rgba(0, 0, 0, 0.4);
      --input-bg: rgba(255, 255, 255, 0.15);
      --input-border: rgba(255, 255, 255, 0.3);
      --error-color: #ff4d4d;
    }

    /* Global Background Animation */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-color);
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #141e30, #243b55, #4e54c8, #8f94fb);
      background-size: 400% 400%;
      animation: bgMove 20s ease infinite; /* Slower, smoother animation */
      overflow: hidden; /* Prevent scrollbars */
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Login Card Styling (Glassmorphism + Animation) */
    .login-card {
      width: 100%;
      max-width: 400px; /* Adjusted max-width */
      padding: 3rem 2.5rem; /* Adjusted padding */
      border-radius: 25px; /* More rounded */
      backdrop-filter: blur(18px); /* Stronger blur */
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 15px 35px var(--shadow-color); /* More prominent shadow */
      animation: fadeInUp 0.9s ease-out forwards; /* Initial pop-in animation */
      opacity: 0; /* Start hidden for animation */
      transform: translateY(60px) scale(0.95); /* Start lower and slightly smaller */
      position: relative;
      z-index: 10; /* Ensure card is above background particles */
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Card Header/Title */
    .login-card h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      background: linear-gradient(90deg, var(--admin-gradient-start), var(--admin-gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
      font-size: 2.6rem; /* Larger font size */
    }

    /* Form Inputs */
    .form-control {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-color);
      border-radius: 12px; /* More rounded inputs */
      padding: 0.8rem 1.2rem; /* More padding */
      transition: all 0.3s ease-in-out;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 0.25rem rgba(255, 138, 0, 0.3); /* Admin accent color glow */
      outline: none;
      transform: translateY(-3px); /* More pronounced lift on focus */
    }

    /* Placeholder text color */
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    /* Custom Button */
    .btn-login {
      background: linear-gradient(90deg, var(--admin-gradient-start), var(--admin-gradient-end));
      background-size: 300% 300%; /* Smaller size for more distinct animation */
      border: none;
      color: #fff;
      border-radius: 12px; /* More rounded button */
      font-weight: 700; /* Bolder text */
      font-size: 1.2rem; /* Larger font size */
      padding: 0.9rem 1.5rem;
      animation: btnShift 8s linear infinite; /* Slower, smoother animation */
      transition: all 0.3s ease-in-out;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    @keyframes btnShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
      transition: all 0.5s ease-in-out;
      z-index: -1;
    }

    .btn-login:hover {
      transform: translateY(-5px); /* More lift on hover */
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    /* Error Message */
    .error-msg {
      color: var(--error-color) !important;
      font-weight: 600;
      text-align: center;
      margin-top: 1.5rem;
      text-shadow: 0 0 6px rgba(255, 77, 77, 0.6);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Font Awesome Icons in inputs */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem; /* Space between input groups */
    }
    .input-group .form-control {
      padding-left: 3rem; /* Space for icon */
    }
    .input-group .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      z-index: 2; /* Ensure icon is above input */
    }

    /* Particle Animation */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.15); /* Slightly less opaque */
      border-radius: 50%;
      animation: floatAndFade 20s infinite ease-in-out; /* Slower animation */
    }

    @keyframes floatAndFade {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      25% {
        opacity: 1;
      }
      50% {
        transform: translateY(-120vh) translateX(60vw) scale(1.8); /* Larger movement */
        opacity: 0.6;
      }
      75% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-240vh) translateX(120vw) scale(0.7); /* Larger movement */
        opacity: 0;
      }
    }
  </style>
</head>

<body>
<!-- Particle Container -->
<div class="particles"></div>

<form class="login-card" action="/admin/adminLogin" method="post" novalidate>
  <h2>Admin&nbsp;Sign-in <i class="fas fa-user-shield"></i></h2>

  <div class="input-group mb-3">
    <i class="input-icon fas fa-envelope"></i>
    <input type="email" name="email" class="form-control" placeholder="Email" required>
  </div>

  <div class="input-group mb-4">
    <i class="input-icon fas fa-lock"></i>
    <input type="password" name="password" class="form-control" placeholder="Password" required>
  </div>

  <button class="btn btn-login w-100">Log&nbsp;In</button>

  <div th:if="${msg}" class="error-msg" th:text="${msg}"></div>
</form>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // JavaScript for particle animation
  document.addEventListener('DOMContentLoaded', () => {
      const particlesContainer = document.querySelector('.particles');
      const numParticles = 40; // More particles for a richer effect

      for (let i = 0; i < numParticles; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          particlesContainer.appendChild(particle);

          // Randomize size, position, and animation delay/duration
          const size = Math.random() * 10 + 3; // 3px to 13px
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.left = `${Math.random() * 100}vw`;
          particle.style.top = `${Math.random() * 100}vh`;
          particle.style.animationDelay = `${Math.random() * 20}s`; // 0s to 20s delay
          particle.style.animationDuration = `${Math.random() * 15 + 15}s`; // 15s to 30s duration
      }
  });
</script>
</body>
</html>
