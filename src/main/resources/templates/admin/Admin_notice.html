<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${title}">Admin Notice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
          margin: 0;
          font-family: 'Nunito', sans-serif;
          background: linear-gradient(-45deg, #00c6ff, #0072ff, #fe8c00, #f83600);
          background-size: 500% 500%;
          animation: bgFlow 16s ease infinite;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          padding: 2rem;
        }

        @keyframes bgFlow {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .notice-card {
          background: rgba(255, 255, 255, 0.08);
          border: 1px solid rgba(255, 255, 255, 0.15);
          border-radius: 20px;
          backdrop-filter: blur(15px);
          box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
          padding: 2rem;
          max-width: 600px;
          width: 100%;
          animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .notice-card label {
          font-weight: 600;
          text-decoration: underline dotted;
        }

        .form-control {
          background: rgba(255, 255, 255, 0.1);
          color: #fff;
          border: 1px solid rgba(255, 255, 255, 0.25);
          border-radius: 10px;
        }

        .form-control:focus {
          background: rgba(255, 255, 255, 0.15);
          border-color: #00ffd5;
          box-shadow: 0 0 10px rgba(0, 255, 213, 0.4);
          outline: none;
        }

        .btn-gradient {
          background: linear-gradient(90deg, #ff8a00, #e52e71, #9b00ff, #0072ff, #00c6ff);
          background-size: 600% 600%;
          color: #fff;
          border: none;
          border-radius: 12px;
          font-weight: 700;
          padding: 0.75rem;
          letter-spacing: 0.5px;
          animation: btnShift 6s linear infinite;
          transition: transform 0.2s, box-shadow 0.2s;
        }

        @keyframes btnShift {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .btn-gradient:hover {
          transform: translateY(-3px);
          box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg fixed-top admin-nav">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin/adminHome}">
            Admin&nbsp;<span>Panel</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#adminNav"><span class="navbar-toggler-icon"></span></button>

        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addEmployee}">Add&nbsp;Employee</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addNotice}">Add&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allUsers}">View&nbsp;Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allEmployees}">View&nbsp;Employees</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allNotices}">View&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allContacts}">View&nbsp;Contacts</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-bookings}">View&nbsp;Bookings</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-feedback}">View&nbsp;Feedback</a></li>
            </ul>

            <form th:action="@{/admin/adminLogout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>
<!-- Flash msg bridge -->
<p id="msg1" th:text="${msg}" style="display: none"></p>

<div th:if="${msg}">
    <script th:inline="javascript">
        let message = document.getElementById('msg1').textContent;
        if(message){
          Swal.fire({
            title: "Success!",
            text: message,
            icon: "success",
            confirmButtonColor: "#3085d6"
          });
        }
    </script>
</div>

<!-- Form -->
<div class="notice-card">
    <h3 class="text-center mb-4 fw-bold" style="text-decoration:underline;">Create New Notice</h3>

    <form method="post" th:object="${noticeObj}" th:action="@{/admin/postNotice}">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" th:field="*{title}" placeholder="Enter title" required>
            <div class="invalid-feedback">Please enter a title.</div>
        </div>

        <div class="mb-4">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="5" th:field="*{description}" placeholder="Describe the notice..." required></textarea>
            <div class="invalid-feedback">Please enter a description.</div>
        </div>

        <button type="submit" class="btn btn-gradient w-100">Add Notice</button>
    </form>
</div>

</body>
</html>
