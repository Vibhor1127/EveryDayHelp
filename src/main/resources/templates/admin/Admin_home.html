<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        :root{
          --accent-1:#ff8a00;
          --accent-2:#9b00ff;
          --accent-3:#00c6ff;
          --glass-bg:rgba(255,255,255,.08);
        }

        body{
          margin:0;padding-top:70px;
          font-family:'Poppins',sans-serif;color:#fff;
          min-height:100vh;
          background:linear-gradient(-45deg,#141e30,#243b55,#4e54c8,#8f94fb);
          background-size:400% 400%;animation:bgAnim 15s ease infinite;
        }
        @keyframes bgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

        /* Admin Navbar */
        .admin-nav{
          backdrop-filter:blur(8px);
          background:rgba(0,0,0,.4)!important;
        }
        .admin-nav .nav-link{
          position:relative;font-weight:500;color:#fff!important;
        }
        .admin-nav .nav-link::after{
          content:"";position:absolute;left:0;bottom:-4px;width:0;height:2px;
          background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
          transition:width .3s;
        }
        .admin-nav .nav-link:hover::after{width:100%}
        .admin-nav .navbar-brand span{color:var(--accent-1)}

        /* Welcome Section */
        .welcome-section {
            text-align: center;
            margin: 3rem 0 4rem 0;
            animation: fadeInDown 1s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .crown-icon {
            display: inline-block;
            font-size: 2.5rem;
            color: var(--accent-1);
            animation: crownFloat 3s ease-in-out infinite;
            margin-left: 1rem;
        }

        @keyframes crownFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }

        .welcome-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
            animation: fadeIn 1.5s ease 0.5s both;
        }

        .welcome-time {
            font-size: 1rem;
            color: var(--accent-3);
            font-weight: 600;
            animation: fadeIn 1.5s ease 0.8s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Enhanced Stat Cards */
        .card-glass{
          background:var(--glass-bg);
          border:2px solid transparent;
          border-radius:25px;
          backdrop-filter:blur(12px);
          box-shadow:0 10px 25px rgba(0,0,0,.45);
          animation:fadeInUp .8s;
          position: relative;
          overflow: hidden;
        }

        .card-glass::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2), var(--accent-3));
            border-radius: 25px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .card-glass:hover::before {
            opacity: 1;
        }

        @keyframes fadeInUp{
            from{opacity:0;transform:translateY(40px) scale(0.9)}
            to{opacity:1;transform:translateY(0) scale(1)}
        }

        .stat-card{
          padding:2.5rem;
          text-align:center;
          transition:transform .3s;
        }
        .stat-card:hover{
            transform:translateY(-10px) scale(1.05);
        }

        .stat-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 10px 30px rgba(255, 138, 0, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .stat-card h3{
            font-size:3rem;
            margin-bottom:.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-3), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card p{
            margin:0;
            font-weight:700;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Logout Button */
        .btn-logout {
            background: linear-gradient(90deg, #ff4d4d, #ff0066);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 102, 0.3);
        }

        .btn-logout:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 0, 102, 0.5);
        }
    </style>
</head>

<body>

<!-- Admin Navbar -->
<nav class="navbar navbar-expand-lg fixed-top admin-nav">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin/adminHome}">
            Admin&nbsp;<span>Panel</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#adminNav"><span class="navbar-toggler-icon"></span></button>

        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addEmployee}">Add&nbsp;Employee</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/addNotice}">Add&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allUsers}">View&nbsp;Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allEmployees}">View&nbsp;Employees</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allNotices}">View&nbsp;Notices</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/allContacts}">View&nbsp;Contacts</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-bookings}">View&nbsp;Bookings</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/view-feedback}">View&nbsp;Feedback</a></li>
            </ul>

            <form th:action="@{/admin/adminLogout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="container py-5">

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h1 class="welcome-title">
            Welcome Back, Admin!
            <i class="crown-icon fas fa-crown"></i>
        </h1>
        <p class="welcome-subtitle">
            <i class="fas fa-shield-alt me-2"></i>
            Your Command Center for EveryDayHelp Platform
        </p>
        <p class="welcome-time">
            <i class="fas fa-clock me-2"></i>
            <span id="currentDateTime"></span>
        </p>
    </div>

    <!-- Flash -->
    <div th:if="${msg}" class="alert alert-success text-center mb-4" th:text="${msg}"></div>

    <!-- Stats row -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card-glass stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h3 th:text="${totalUsers}">0</h3>
                <p>Total Users</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-glass stat-card">
                <div class="stat-icon">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h3 th:text="${totalEmployees}">0</h3>
                <p>Total Employees</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-glass stat-card">
                <div class="stat-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <h3 th:text="${contactsToday}">0</h3>
                <p>Contacts Today</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Prevent back button after logout
    (function() {
        window.history.pushState(null, "", window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, "", window.location.href);
        };
    })();

    // Display current date and time
    function updateDateTime() {
        const now = new Date();
        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        };
        document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>
</body>
</html>
