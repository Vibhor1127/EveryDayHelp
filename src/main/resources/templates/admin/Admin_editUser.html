<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit User (Admin)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
        --accent: #ff7b00;
        --glass-bg: rgba(255, 255, 255, 0.08);
    }

    body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        padding-top: 80px;
        background: linear-gradient(-45deg, #141e30, #243b55, #4e54c8, #8f94fb);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .form-glass {
        backdrop-filter: blur(10px);
        background: var(--glass-bg);
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    label {
        font-weight: 600;
        color: var(--accent);
    }

    input, textarea {
        background: rgba(255, 255, 255, 0.1) !important;
        border: none;
        color: white;
    }

    input::placeholder, textarea::placeholder {
        color: #ccc;
    }

    .btn-edit {
        background-color: var(--accent);
        border: none;
        color: white;
        font-weight: bold;
    }

    .btn-edit:hover {
        background-color: #e66e00;
    }

    h2 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 1.5rem;
        text-shadow: 0 0 10px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<!-- Optional: Admin Header -->
<!--<div th:replace="~{/fragments/admin_navbar::adminNav}"></div>-->

<div class="container col-md-6">
  <div class="form-glass">
    <h2>Edit User (Admin)</h2>

    <form th:action="@{/admin/editUser}" method="post" th:object="${user}">
      <input type="hidden" th:field="*{email}" name="email"/>

      <div class="mb-3">
        <label for="name">Name</label>
        <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Enter full name" required>
      </div>

      <div class="mb-3">
        <label for="phone">Phone</label>
        <input type="number" th:field="*{phone}" id="phone" class="form-control" placeholder="Enter phone number" required>
      </div>



      <div class="mb-3">
        <label for="address">Address</label>
        <textarea th:field="*{address}" id="address" class="form-control" rows="3" placeholder="Enter address" required></textarea>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-edit btn-lg">Edit</button>
      </div>
    </form>
  </div>
</div>

<!-- Optional: Footer -->
<div th:replace="~{/fragments/footer::footerFragment}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
