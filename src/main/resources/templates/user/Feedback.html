<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Poppins & Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* CSS Variables for consistent theming */
        :root {
            /* Background Gradient Colors (Liquid Aurora inspired) */
            --bg-main-start: #0a1930;   /* Very Dark Blue */
            --bg-main-mid: #1b2e4a;     /* Darker Blue */
            --bg-main-end: #2d4262;     /* Medium Blue */

            /* Colors for the flowing aurora effect */
            --aurora-color1: rgba(70, 130, 180, 0.4); /* SteelBlue, semi-transparent */
            --aurora-color2: rgba(138, 43, 226, 0.3); /* BlueViolet, semi-transparent */
            --aurora-color3: rgba(0, 206, 209, 0.3);  /* DarkTurquoise, semi-transparent */

            --card-glass-bg: rgba(255, 255, 255, 0.08);
            --card-glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #fff;
            --shadow-color: rgba(0, 0, 0, 0.5);

            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.3);
            --input-focus-glow: #00f2ff;

            --button-gradient-start: #ff6ec4; /* Pink */
            --button-gradient-mid1: #7873f5;   /* Purple */
            --button-gradient-mid2: #00c6ff;   /* Light Blue */
            --button-gradient-end: #0072ff;    /* Dark Blue */

            --star-color-active: #FFD700; /* Gold */
            --star-color-inactive: rgba(255, 255, 255, 0.3);
        }

        /* Global Body & Background Animation */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-main-start), var(--bg-main-mid), var(--bg-main-end));
            background-size: 300% 300%;
            animation: bgGradientShift 25s ease infinite alternate;
            overflow: hidden; /* Crucial for background effects */
            position: relative; /* For pseudo-elements */
        }

        @keyframes bgGradientShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Unique "Liquid Aurora" Background Effect */
        body::before, body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0; /* Behind the main content */
            mix-blend-mode: screen; /* Blends colors beautifully */
        }

        body::before {
            background:
                radial-gradient(circle at 20% 70%, var(--aurora-color1) 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, var(--aurora-color2) 0%, transparent 50%);
            background-size: 150% 150%; /* Larger for softer blend */
            animation: auroraFlow1 30s linear infinite alternate;
        }

        body::after {
            background:
                radial-gradient(circle at 70% 10%, var(--aurora-color3) 0%, transparent 60%),
                radial-gradient(circle at 30% 90%, var(--aurora-color1) 0%, transparent 60%);
            background-size: 180% 180%; /* Even larger for more subtle movement */
            animation: auroraFlow2 40s linear infinite;
        }

        @keyframes auroraFlow1 {
            0% { background-position: 0% 0%; transform: scale(1); }
            100% { background-position: 100% 100%; transform: scale(1.1); }
        }

        @keyframes auroraFlow2 {
            0% { background-position: 100% 0%; transform: scale(1.1); }
            100% { background-position: 0% 100%; transform: scale(1); }
        }

        /* Main Container for Form */
        .container {
            padding: 2rem 1rem;
            max-width: 600px; /* Max width for the form card */
            width: 100%;
            z-index: 1; /* Ensure content is above background */
            position: relative;
        }

        /* Page Title */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-align: center;
            margin-bottom: 3rem;
            font-size: 3.5rem;
            background: linear-gradient(90deg, var(--button-gradient-start), var(--button-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px var(--button-gradient-start); }
            to { text-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 30px var(--button-gradient-end); }
        }

        /* Card Styling */
        .card-glass {
            background: var(--card-glass-bg);
            border: 1px solid var(--card-glass-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 30px var(--shadow-color);
            padding: 2.5rem;
            text-align: left; /* Align form content to left */
            opacity: 0; /* Start hidden for pop-up animation */
            transform: translateY(50px) scale(0.9);
            animation: popUp 0.8s ease-out forwards;
        }

        @keyframes popUp {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Form Labels */
        .form-label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
            display: block; /* Ensure labels take full width */
        }

        /* Form Inputs & Textarea */
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-color);
            padding: 0.75rem 1rem;
            transition: all 0.3s ease-in-out;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--input-focus-glow);
            box-shadow: 0 0 0 0.25rem rgba(0, 242, 255, 0.25);
            transform: translateY(-2px);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px; /* Taller remark box */
        }

        /* Star Rating */
        .star-rating {
            display: inline-block;
            font-size: 2.5rem; /* Larger stars */
            color: var(--star-color-inactive);
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            margin: 0 5px; /* Space between stars */
        }

        .star-rating .fas {
            color: var(--star-color-active);
        }

        .star-rating:hover {
            transform: scale(1.1);
        }

        .star-rating-container {
            text-align: center;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        /* Submit Button */
        .btn-submit {
            background: linear-gradient(90deg, var(--button-gradient-start), var(--button-gradient-end));
            background-size: 200% 200%;
            color: white;
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.4s ease-in-out;
            animation: btnPulse 5s linear infinite alternate;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes btnPulse {
            0% { background-position: 0% 50%; transform: scale(1); }
            50% { background-position: 100% 50%; transform: scale(1.02); }
            100% { background-position: 0% 50%; transform: scale(1); }
        }

        .btn-submit:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5);
            opacity: 0.9;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }
            .card-glass {
                padding: 1.5rem;
            }
            .star-rating {
                font-size: 2rem;
                margin: 0 3px;
            }
            .btn-submit {
                font-size: 1rem;
                padding: 0.7rem 1.8rem;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .card-glass {
                padding: 1rem;
            }
            .star-rating {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Share Your Feedback <i class="fas fa-comment-dots"></i></h1>

    <div class="card-glass mx-auto">
        <form id="feedbackForm">
            <div class="mb-4">
                <label for="userEmail" class="form-label"><i class="fas fa-at"></i> Your Email</label>
                <!-- Read-only email input -->
                <input type="email" class="form-control" id="userEmail" value="user@example.com" readonly aria-label="User Email (read-only)">
            </div>

            <div class="mb-4">
                <label for="userName" class="form-label"><i class="fas fa-user"></i> Your Name</label>
                <input type="text" class="form-control" id="userName" name="userName" placeholder="Enter your name" required>
            </div>

            <div class="mb-4">
                <label class="form-label d-block text-center"><i class="fas fa-star"></i> Star Rating</label>
                <div class="star-rating-container" id="starRatingContainer">
                    <i class="far fa-star star" data-value="1"></i>
                    <i class="far fa-star star" data-value="2"></i>
                    <i class="far fa-star star" data-value="3"></i>
                    <i class="far fa-star star" data-value="4"></i>
                    <i class="far fa-star star" data-value="5"></i>
                    <input type="hidden" name="rating" id="ratingInput" value="0" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="remark" class="form-label"><i class="fas fa-pencil-alt"></i> Remarks</label>
                <textarea class="form-control" id="remark" name="remark" rows="4" placeholder="Share your thoughts and suggestions here..."></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-submit">
                    Submit Feedback <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const starRatingContainer = document.getElementById('starRatingContainer');
        const stars = starRatingContainer.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');
        let currentRating = 0;

        function updateStars(rating) {
            stars.forEach(star => {
                if (parseInt(star.dataset.value) <= rating) {
                    star.classList.remove('far');
                    star.classList.add('fas');
                } else {
                    star.classList.remove('fas');
                    star.classList.add('far');
                }
            });
        }

        // Handle hover effect
        starRatingContainer.addEventListener('mouseover', (event) => {
            const hoveredStar = event.target.closest('.star');
            if (hoveredStar) {
                const value = parseInt(hoveredStar.dataset.value);
                updateStars(value);
            }
        });

        // Revert to selected rating when mouse leaves
        starRatingContainer.addEventListener('mouseout', () => {
            updateStars(currentRating);
        });

        // Handle click to set rating
        starRatingContainer.addEventListener('click', (event) => {
            const clickedStar = event.target.closest('.star');
            if (clickedStar) {
                currentRating = parseInt(clickedStar.dataset.value);
                ratingInput.value = currentRating; // Update hidden input
                updateStars(currentRating);
            }
        });

        // Form submission (placeholder)
        const feedbackForm = document.getElementById('feedbackForm');
        feedbackForm.addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent default form submission

            const email = document.getElementById('userEmail').value;
            const name = document.getElementById('userName').value;
            const rating = ratingInput.value;
            const remark = document.getElementById('remark').value;

            if (rating === '0') {
                alert('Please provide a star rating.');
                return;
            }
            if (!name.trim()) {
                alert('Please enter your name.');
                return;
            }

            console.log('Feedback Submitted:', { email, name, rating, remark });
            alert('Thank you for your feedback!'); // Replace with actual success message/redirect

            // Here you would typically send this data to your Spring Boot backend
            // using a fetch() API call, similar to the AllServices page.
            // Example (uncomment and adapt for your backend endpoint):
            /*
            const formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('name', name);
            formData.append('rating', rating);
            formData.append('remark', remark);

            fetch('/api/submitFeedback', { // Define this endpoint in your Spring Controller
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString(),
            })
            .then(response => response.json())
            .then(data => {
                console.log('Backend response:', data);
                alert('Feedback submitted successfully!');
                // Optionally clear form or redirect
            })
            .catch(error => {
                console.error('Error submitting feedback:', error);
                alert('Failed to submit feedback. Please try again.');
            });
            */
        });
    });
</script>
</body>
</html>
