<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EveryDayHelp</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Poppins & Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* CSS Variables for easy customization */
        :root {
            --primary-gradient-start: #6a11cb; /* Purple */
            --primary-gradient-end: #2575fc;   /* Blue */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --text-color: #fff;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.3);
            --error-color: #ff4d4d;
        }

        /* Global Background Animation */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBackground 15s ease infinite;
            overflow: hidden; /* Prevent scrollbars from background animation */
        }

        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Card Styling (Glassmorphism + Animation) */
        .card {
            width: 100%;
            max-width: 450px; /* Slightly wider for better layout */
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px; /* More rounded corners */
            backdrop-filter: blur(20px); /* Stronger blur */
            box-shadow: 0 20px 40px var(--shadow-color); /* More prominent shadow */
            padding: 3rem; /* More padding */
            animation: cardPopIn 0.8s ease-out forwards; /* Initial pop-in animation */
            opacity: 0; /* Start hidden for animation */
            transform: translateY(50px) scale(0.9); /* Start lower and slightly smaller */
            position: relative;
            z-index: 10; /* Ensure card is above background particles */
        }

        @keyframes cardPopIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Card Header/Title */
        .card h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--primary-gradient-start), var(--primary-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Form Labels */
        .form-label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.5rem;
        }

        /* Form Inputs */
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-color);
            padding: 0.75rem 1rem;
            transition: all 0.3s ease-in-out;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-gradient-end);
            box-shadow: 0 0 0 0.25rem rgba(37, 117, 252, 0.25); /* Bootstrap-like focus glow */
            transform: translateY(-2px); /* Subtle lift on focus */
        }

        /* Placeholder text color */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Custom Button */
        .btn-custom {
            background: linear-gradient(90deg, var(--primary-gradient-start), var(--primary-gradient-end));
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease-in-out;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-custom::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0));
            transition: all 0.4s ease-in-out;
            z-index: -1;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-custom:hover::before {
            left: 100%;
        }

        .btn-custom:active {
            transform: translateY(0);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Create Account Link */
        .create-account-link {
            display: block;
            margin-top: 1.5rem;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s ease-in-out;
            font-weight: 500;
        }

        .create-account-link:hover {
            color: var(--primary-gradient-end);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }

        /* Error Message */
        .text-danger {
            color: var(--error-color) !important;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 77, 77, 0.5);
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .card {
                padding: 2rem;
                margin: 1rem;
            }
            .card h3 {
                font-size: 2rem;
            }
        }

        /* Particle Animation (Optional but enhances beauty) */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: floatAndFade 15s infinite ease-in-out;
        }

        @keyframes floatAndFade {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            25% {
                opacity: 1;
            }
            50% {
                transform: translateY(-100vh) translateX(50vw) scale(1.5);
                opacity: 0.5;
            }
            75% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-200vh) translateX(100vw) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
<!-- Particle Container (Optional) -->
<div class="particles"></div>

<div class="card p-4">
    <h3 class="text-center mb-4">User Login <i class="fas fa-sign-in-alt"></i></h3>
    <form th:action="@{/userLogin}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email address</label>
            <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">Login</button>
    </form>
    <div class="text-center mt-3">
        <p class="text-danger" th:text="${msg}"></p>
        <a th:href="@{/UserRegistration}" class="create-account-link">
            Don't have an account? <span style="text-decoration: underline;">Create one!</span> <i class="fas fa-user-plus"></i>
        </a>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // JavaScript for particle animation (optional)
    document.addEventListener('DOMContentLoaded', () => {
        const particlesContainer = document.querySelector('.particles');
        const numParticles = 30; // Number of particles

        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particlesContainer.appendChild(particle);

            // Randomize size, position, and animation delay
            const size = Math.random() * 8 + 2; // 2px to 10px
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animationDelay = `${Math.random() * 15}s`; // 0s to 15s delay
            particle.style.animationDuration = `${Math.random() * 10 + 10}s`; // 10s to 20s duration
        }
    });
</script>
</body>
</html>
