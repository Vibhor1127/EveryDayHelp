<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Contact Us - EveryDayHelp</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
          crossorigin="anonymous">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />

    <style>
        /* CSS Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --text-main: #ffffff;
            --neon-pink: #ff006e;
            --neon-blue: #00f5ff;
            --neon-purple: #8b00ff;
            --neon-green: #00ff41;
            --accent-1: #ff6ec4;
            --accent-2: #7873f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding-top: 72px;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(139, 0, 255, 0.1) 0%, transparent 50%);
            animation: backgroundMove 15s ease infinite;
            z-index: -1;
        }

        @keyframes backgroundMove {
            0%, 100% {
                background-position: 0% 0%, 100% 100%, 50% 0%;
            }
            50% {
                background-position: 100% 100%, 0% 0%, 0% 100%;
            }
        }

        /* Hero Section with Neon Title */
        .hero-section {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.3) 0%, rgba(0, 245, 255, 0.3) 100%);
            padding: 5rem 0 4rem 0;
            margin-top: -72px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 0, 110, 0.3);
        }

        .hero-section::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 0, 110, 0.03) 2px,
                rgba(255, 0, 110, 0.03) 4px
            );
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .neon-title {
            position: relative;
            z-index: 2;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: neonGlow 2s ease-in-out infinite alternate;
            text-shadow:
                0 0 10px var(--neon-pink),
                0 0 20px var(--neon-pink),
                0 0 30px var(--neon-pink),
                0 0 40px var(--neon-blue),
                0 0 70px var(--neon-blue),
                0 0 80px var(--neon-blue);
        }

        @keyframes neonGlow {
            from {
                text-shadow:
                    0 0 10px var(--neon-pink),
                    0 0 20px var(--neon-pink),
                    0 0 30px var(--neon-pink),
                    0 0 40px var(--neon-blue),
                    0 0 70px var(--neon-blue);
            }
            to {
                text-shadow:
                    0 0 20px var(--neon-pink),
                    0 0 30px var(--neon-pink),
                    0 0 40px var(--neon-pink),
                    0 0 50px var(--neon-blue),
                    0 0 80px var(--neon-blue),
                    0 0 100px var(--neon-blue);
            }
        }

        .hero-subtitle {
            position: relative;
            z-index: 2;
            text-align: center;
            font-size: 1.3rem;
            margin-top: 1rem;
            color: var(--neon-blue);
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contact Info Cards */
        .contact-info-section {
            margin: 3rem 0;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue), var(--neon-purple), var(--neon-green));
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .info-card:hover::before {
            opacity: 1;
        }

        .info-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.3);
        }

        .info-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            box-shadow:
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-blue);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow:
                    0 0 20px var(--neon-pink),
                    0 0 40px var(--neon-blue);
            }
            50% {
                transform: scale(1.1);
                box-shadow:
                    0 0 30px var(--neon-pink),
                    0 0 60px var(--neon-blue),
                    0 0 80px var(--neon-purple);
            }
        }

        .info-card h4 {
            color: var(--neon-blue);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        /* Neon Form Container */
        .form-container {
            max-width: 800px;
            margin: 3rem auto;
            position: relative;
        }

        .neon-form {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 3rem;
            position: relative;
            box-shadow:
                0 0 20px rgba(255, 0, 110, 0.5),
                0 0 40px rgba(0, 245, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            animation: formGlow 3s ease-in-out infinite;
        }

        @keyframes formGlow {
            0%, 100% {
                border-color: rgba(255, 0, 110, 0.5);
                box-shadow:
                    0 0 20px rgba(255, 0, 110, 0.5),
                    0 0 40px rgba(0, 245, 255, 0.3);
            }
            50% {
                border-color: rgba(0, 245, 255, 0.5);
                box-shadow:
                    0 0 30px rgba(0, 245, 255, 0.5),
                    0 0 50px rgba(255, 0, 110, 0.3);
            }
        }

        .form-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShine 3s linear infinite;
            background-size: 200% auto;
        }

        @keyframes titleShine {
            to {
                background-position: 200% center;
            }
        }

        .neon-form label {
            display: block;
            font-weight: 600;
            color: var(--neon-blue);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .neon-form input,
        .neon-form textarea {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .neon-form input::placeholder,
        .neon-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .neon-form input:focus,
        .neon-form textarea:focus {
            outline: none;
            border-color: var(--neon-pink);
            background: rgba(255, 255, 255, 0.1);
            box-shadow:
                0 0 20px rgba(255, 0, 110, 0.5),
                inset 0 0 10px rgba(0, 245, 255, 0.2);
            transform: translateY(-2px);
        }

        .neon-form textarea {
            resize: vertical;
            min-height: 150px;
        }

        /* Neon Submit Button */
        .neon-button {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg,
                var(--neon-pink),
                var(--neon-blue),
                var(--neon-purple),
                var(--neon-green),
                var(--neon-pink));
            background-size: 300% 100%;
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow:
                0 0 20px rgba(255, 0, 110, 0.6),
                0 0 40px rgba(0, 245, 255, 0.4);
            animation: buttonSlide 3s linear infinite;
        }

        @keyframes buttonSlide {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .neon-button::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .neon-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .neon-button:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 30px rgba(255, 0, 110, 0.8),
                0 0 60px rgba(0, 245, 255, 0.6),
                0 0 90px rgba(139, 0, 255, 0.4);
        }

        .neon-button:active {
            transform: scale(0.98);
        }

        .neon-button span {
            position: relative;
            z-index: 1;
        }

        /* Success Message */
        .success-message {
            text-align: center;
            color: var(--neon-green);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--neon-green);
            animation: messageGlow 1s ease-in-out infinite;
        }

        @keyframes messageGlow {
            0%, 100% {
                text-shadow: 0 0 10px var(--neon-green);
            }
            50% {
                text-shadow: 0 0 20px var(--neon-green), 0 0 30px var(--neon-green);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .neon-title {
                font-size: 2.5rem;
            }

            .neon-form {
                padding: 2rem 1.5rem;
            }

            .form-title {
                font-size: 2rem;
            }

            .info-icon {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
<!-- Header Fragment -->
<div th:replace="~{fragments/header :: headerFragment}"></div>

<!-- Hero Section -->
<div class="hero-section">
    <div class="container">
        <h1 class="neon-title">Contact Us</h1>
        <p class="hero-subtitle">
            <i class="fas fa-bolt me-2"></i>
            Let's Connect and Make Magic Happen
            <i class="fas fa-bolt ms-2"></i>
        </p>
    </div>
</div>

<!-- Success Message -->
<div class="container" th:if="${msg}">
    <div class="success-message">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${msg}"></span>
    </div>
</div>

<!-- Contact Info Cards -->
<div class="container contact-info-section">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="info-card">
                <div class="info-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <h4>Email Us</h4>
                <p>support@everydayhelp.com</p>
                <p class="mb-0" style="opacity: 0.7;">We reply within 24 hours</p>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="info-card">
                <div class="info-icon">
                    <i class="fas fa-phone"></i>
                </div>
                <h4>Call Us</h4>
                <p>+91 123 456 7890</p>
                <p class="mb-0" style="opacity: 0.7;">Mon - Fri, 9AM - 6PM</p>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="info-card">
                <div class="info-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <h4>Visit Us</h4>
                <p>Bhubaneswar, Odisha</p>
                <p class="mb-0" style="opacity: 0.7;">India</p>
            </div>
        </div>
    </div>
</div>

<!-- Contact Form -->
<div class="form-container">
    <form th:action="@{/contactUs}" method="post" class="neon-form">
        <h2 class="form-title">Send Us a Message</h2>

        <label for="name">
            <i class="fas fa-user me-2"></i>Your Name
        </label>
        <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required
        />

        <label for="email">
            <i class="fas fa-envelope me-2"></i>Email Address
        </label>
        <input
                type="email"
                id="email"
                name="email"
                placeholder="your.email@example.com"
                required
        />

        <label for="phone">
            <i class="fas fa-phone me-2"></i>Phone Number
        </label>
        <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="+91 1234567890"
        />

        <label for="subject">
            <i class="fas fa-tag me-2"></i>Subject
        </label>
        <input
                type="text"
                id="subject"
                name="subject"
                placeholder="What is this regarding?"
                required
        />

        <label for="question">
            <i class="fas fa-comment-dots me-2"></i>Your Message
        </label>
        <textarea
                id="question"
                name="question"
                placeholder="Tell us how we can help you..."
                required
        ></textarea>

        <button type="submit" class="neon-button">
                <span>
                    <i class="fas fa-paper-plane me-2"></i>
                    Send Message
                </span>
        </button>
    </form>
</div>

<!-- Footer Fragment -->
<div th:replace="~{fragments/footer :: footerFragment}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
